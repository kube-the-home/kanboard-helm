name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    uses: kube-the-home/github-actions/.github/workflows/semantic-release.yaml@e698429ae3d6096c14d7eb6d2ffef1da8c26cdea # v1.4.1
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}

  helm:
    needs: release
    if: needs.release.outputs.new_version != ''
    uses: kube-the-home/github-actions/.github/workflows/helm-release.yaml@e698429ae3d6096c14d7eb6d2ffef1da8c26cdea # v1.4.1
    with:
      chart_path: charts/kanboard
      version: ${{ needs.release.outputs.new_version }}
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}
